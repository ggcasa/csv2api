<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Tracking</title>
</head>
<body>

    <div>
        <input type="text" id="cauta_id" placeholder="ID Bula">
        <input type="text" id="simuleaza_lat" placeholder="Latitudine">
        <input type="text" id="simuleaza_long" placeholder="Longitudine">
        <input type="text" id="nou_block" placeholder="Nume Block">
        <button id="btn_aloca">Alocă Locație</button>
        <button id="btn_trimite">Trimite la Server</button>
    </div>

    <div id="zona_vizuala" style="display: none; margin-top: 20px;">
        <p><strong>Detalii Vehicul:</strong></p>
        <div id="detalii_vehicul"></div>

        <p><strong>Istoric Mișcare (Sursa SQLite + Local):</strong></p>
        <ul id="istoric_timeline"></ul>
    </div>

    <pre id="ecran" style="display: none;"></pre>

<script>
    (async () => {
        const ecran = document.getElementById("ecran");
        const zonaVizuala = document.getElementById("zona_vizuala");
        
        const cerereDB = indexedDB.open("pwa_db_joc", 2);

        cerereDB.onupgradeneeded = (e) => {
            const dbUpgrade = e.target.result;
            if (!dbUpgrade.objectStoreNames.contains("masini")) {
                dbUpgrade.createObjectStore("masini", { keyPath: "id_bula" });
            }
            if (!dbUpgrade.objectStoreNames.contains("modificari")) {
                dbUpgrade.createObjectStore("modificari", { autoIncrement: true });
            }
        };

        cerereDB.onsuccess = async (e) => {
            const db = e.target.result;
            let dateMasini = [];
            let istoricServerGlobal = []; 

            const afiseaza = (text) => ecran.innerText = typeof text === "string" ? text : JSON.stringify(text, null, 2);

            const reincarcaDateServer = async () => {
                try {
                    const raspunsRaw = await fetch("http://localhost:9977/");
                    const dateServer = await raspunsRaw.json();
                    
                    if (dateServer) {
                        dateMasini = dateServer.catalog || [];
                        istoricServerGlobal = dateServer.tracking || []; 
                    }

                    if (dateMasini.length > 0) {
                        const stocare = db.transaction("masini", "readwrite").objectStore("masini");
                        dateMasini.forEach(m => stocare.put(m));
                    }
                    afiseaza(dateServer);
                } catch (err) {
                    db.transaction("masini", "readonly").objectStore("masini").getAll().onsuccess = (ev) => {
                        dateMasini = ev.target.result || [];
                    };
                }
            };

            await reincarcaDateServer();

            document.getElementById("cauta_id").oninput = (ev) => {
                const valoare = ev.target.value.toUpperCase();
                if (!valoare) { zonaVizuala.style.display = "none"; afiseaza(dateMasini); return; }

                const masinaGasita = dateMasini.find(m => m.id_bula === valoare);

                db.transaction("modificari", "readonly").objectStore("modificari").getAll().onsuccess = (eveniment) => {
                    const toateModificarileLocale = eveniment.target.result || [];
                    
                    const locale = toateModificarileLocale.filter(mod => mod.id_bula === valoare);
                    const server = istoricServerGlobal.filter(mod => mod.id_bula === valoare);

                    // Unim sursa locala cu sursa din SQLite3
                    let istoricTotal = [...locale, ...server];

                    // Sortam curat dupa string-ul datei (cele mai recente sus)
                    istoricTotal.sort((a, b) => b.data_modificare.localeCompare(a.data_modificare));

                    if (masinaGasita || istoricTotal.length > 0) {
                        zonaVizuala.style.display = "block";
                        afiseaza({ vehicul: masinaGasita || "Bulă nouă", istoric_tracking: istoricTotal });

                        document.getElementById("detalii_vehicul").innerHTML = masinaGasita ? `
                            ID: ${masinaGasita.id_bula} | Marcă: ${masinaGasita.marca} | Culoare: ${masinaGasita.culoare} | Volum: ${masinaGasita.marime_volum} m³ | Greutate: ${masinaGasita.greutate_kg} kg | Inițial: ${masinaGasita.location_block}
                        ` : `<p>Bula nu există în catalog.</p>`;

                        document.getElementById("istoric_timeline").innerHTML = istoricTotal.map(p => `
                            <li>[${p.data_modificare || 'Recent'}] Bloc: ${p.location_block || 'Nedefinit'} (Coordonate: ${p.latitudine || '0'}, ${p.longitudine || '0'})</li>
                        `).join("");
                    } else {
                        zonaVizuala.style.display = "none";
                        afiseaza("Nu s-a găsit nimic pentru ID: " + valoare);
                    }
                };
            };

            document.getElementById("btn_aloca").onclick = () => {
                const idCautat = document.getElementById("cauta_id").value.toUpperCase();
                const lat = document.getElementById("simuleaza_lat").value;
                const long = document.getElementById("simuleaza_long").value;
                const block = document.getElementById("nou_block").value;

                if (idCautat && lat && long && block) {
                    const punctTraseu = {
                        id_bula: idCautat,
                        location_block: block,
                        latitudine: lat,
                        longitudine: long,
                        data_modificare: new Date().toLocaleString("ro-RO")
                    };

                    const tranzactie = db.transaction("modificari", "readwrite");
                    tranzactie.objectStore("modificari").add(punctTraseu);
                    
                    tranzactie.oncomplete = () => {
                        document.getElementById("simuleaza_lat").value = "";
                        document.getElementById("simuleaza_long").value = "";
                        document.getElementById("nou_block").value = "";
                        document.getElementById("cauta_id").dispatchEvent(new Event('input'));
                    };
                } else {
                    alert("Completează toate câmpurile!");
                }
            };

            document.getElementById("btn_trimite").onclick = () => {
                db.transaction("modificari", "readonly").objectStore("modificari").getAll().onsuccess = async (ev) => {
                    const deTrimis = ev.target.result || [];
                    if (deTrimis.length === 0) { alert("Nu ai mișcări noi salvate local!"); return; }

                    try {
                        const raspuns = await fetch("http://localhost:9977/salveaza-tracking", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(deTrimis)
                        });

                        if (raspuns.ok) {
                            alert("Sincronizat în SQLite3!");
                            const stergere = db.transaction("modificari", "readwrite");
                            stergere.objectStore("modificari").clear();
                            stergere.oncomplete = async () => {
                                await reincarcaDateServer();
                                document.getElementById("cauta_id").dispatchEvent(new Event('input'));
                            };
                        } else {
                            alert(`Eroare server: ${raspuns.status}`);
                        }
                    } catch (eroare) {
                        alert("Server oprit! " + eroare.message);
                    }
                };
            };
        };
    })();
</script>
</body>
</html>
